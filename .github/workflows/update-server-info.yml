name: Update Server Info

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Ensure script is executable
        run: chmod +x scripts/fetch-data.sh

      - name: Fetch Server Data
        run: ./scripts/fetch-data.sh

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add src/lib/server-data.json
          git commit -m "chore: update server stats" || echo "No changes to commit"
          git push