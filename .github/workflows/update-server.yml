name: Update Server Status
on:
  schedule:
    - cron: '*/5 * * * *' # GH Actions minimum is 5 mins. Attempt to push it.
  workflow_dispatch: # Allows for manual refresh

jobs:
  update-status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Fetch Server Data
        run: |
          # Fetch data and pipe to public/status.json
          # You might need to parse this with 'jq' to match the Svelte props
          curl -s "https://api.example.com/your-server-id" > public/status.json
          echo "{\"lastUpdated\": \"$(date -uISO8601)\"}" > public/meta.json

      - name: Commit and Push
        run: |
          git config --global user.name 'Status Bot'
          git config --global user.email 'bot@github.com'
          git add public/status.json public/meta.json
          git commit -m "chore: update server status [skip ci]" || exit 0
          git push